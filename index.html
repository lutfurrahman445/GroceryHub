<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Hub - Fresh Groceries</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <h1><i class="fas fa-shopping-basket"></i> Grocery Hub</h1>
            <p>Freshness delivered</p>
        </div>
        <a href="https://wa.me/917002336938?text=Hello%20Grocery%20Hub" target="_blank" class="whatsapp-btn">
            <i class="fab fa-whatsapp"></i> 7002336938
        </a>
    </header>

    <div class="hero">
        <h2>All Grocery Items</h2>
        <div class="address"><i class="fas fa-map-marker-alt"></i> Dhirenpara, Guwahati - 781025</div>
    </div>

    <div class="container">
        <aside class="filters">
            <h3>Categories</h3>
            <select id="categoryFilter">
                <option value="all">All</option>
                <option>Grains</option><option>Pantry</option><option>Oils</option>
                <option>Pulses</option><option>Beverages</option><option>Sauces</option>
                <option>Fruits</option><option>Vegetables</option><option>Dairy</option><option>Bakery</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search product...">
        </aside>

        <main>
            <div id="productsGrid" class="products-grid"></div>
        </main>

        <div class="cart-sidebar">
            <h3><i class="fas fa-cart-shopping"></i> Your Cart</h3>
            <div id="cartItems"></div>
            <div class="cart-total">Total: ₹<span id="cartTotal">0</span></div>
            <button id="checkoutBtn" class="checkout-btn">Place Order</button>
        </div>
    </div>

    <div class="map-section">
        <h3><i class="fas fa-location-dot"></i> Store Location</h3>
        <div id="storeMap" style="height: 300px; border-radius: 12px;"></div>
        <p>📍 Dhirenpara, Guwahati, Assam - 781025</p>
    </div>

    <footer>© 2025 Grocery Hub | WhatsApp 7002336938</footer>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Order Details</h2>
            <form id="orderForm">
                <input type="text" id="custName" placeholder="Full Name" required>
                <input type="tel" id="custPhone" placeholder="Phone" required>
                <textarea id="custAddress" placeholder="Full Address" required></textarea>
                <button type="submit">Confirm Order</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
