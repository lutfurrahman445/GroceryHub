<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QuickBazar – Dhirenpara, Guwahati</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background-color: #f5f7fb;
      padding-bottom: 80px;
    }

    /* header */
    .header {
      background: white;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(135deg, #0b4f2c, #2e7d32);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .location {
      font-size: 0.85rem;
      background: #f0f2f5;
      padding: 6px 12px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cart-icon {
      background: #2e7d32;
      color: white;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* category tabs */
    .cats {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      overflow-x: auto;
      background: white;
      border-bottom: 1px solid #eee;
    }
    .cat {
      background: #f0f2f5;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      white-space: nowrap;
      cursor: pointer;
      transition: 0.2s;
    }
    .cat.active {
      background: #2e7d32;
      color: white;
    }

    /* product grid */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      padding: 16px;
    }
    .product-card {
      background: white;
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: 0.2s;
    }
    .product-img {
      background: #f9f9f9;
      border-radius: 16px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .product-name {
      font-weight: 600;
      margin: 10px 0 4px;
      font-size: 0.95rem;
    }
    .product-weight {
      font-size: 0.7rem;
      color: #666;
    }
    .price {
      font-weight: bold;
      color: #1b5e20;
      margin: 8px 0;
      font-size: 1.1rem;
    }
    .add-btn {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 8px 0;
      width: 100%;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .add-btn:hover {
      background: #1b5e20;
    }

    /* cart drawer */
    .cart-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .cart-drawer {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 90%;
      max-width: 400px;
      background: white;
      z-index: 101;
      padding: 20px;
      transform: translateX(100%);
      transition: 0.3s;
      display: flex;
      flex-direction: column;
      box-shadow: -2px 0 20px rgba(0,0,0,0.1);
    }
    .cart-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .cart-drawer.active {
      transform: translateX(0);
    }
    .cart-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      font-size: 1.3rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }
    .cart-items {
      flex: 1;
      overflow-y: auto;
      margin: 16px 0;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .cart-total {
      font-weight: bold;
      border-top: 1px solid #ccc;
      padding-top: 12px;
      margin: 10px 0;
      font-size: 1.2rem;
    }
    .checkout-btn {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    .address-input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 16px;
      margin: 10px 0;
      font-size: 0.9rem;
    }
    label {
      font-size: 0.8rem;
      font-weight: 500;
    }
    .close-cart {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.7rem;
      color: gray;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">🛵 QuickBazar</div>
  <div class="location">📍 Dhirenpara, Guwahati - 781025</div>
  <div class="cart-icon" id="cartIcon">🛒 <span id="cartCount">0</span></div>
</div>

<div class="cats" id="categoryTabs">
  <div class="cat active" data-cat="all">All</div>
  <div class="cat" data-cat="essentials">Essentials</div>
  <div class="cat" data-cat="snacks">Snacks</div>
  <div class="cat" data-cat="beverages">Beverages</div>
</div>

<div class="products" id="productsContainer"></div>
<footer>⚡ 10-15 min delivery in Dhirenpara | COD & UPI</footer>

<!-- Cart Drawer -->
<div class="cart-overlay" id="cartOverlay">
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <span>Your Cart 🛒</span>
      <button class="close-cart" id="closeCartBtn">✕</button>
    </div>
    <div class="cart-items" id="cartItemsList"></div>
    <div class="cart-total" id="cartTotalDisplay">Total: ₹0</div>
    <label>📍 Delivery Address (Dhirenpara)</label>
    <input type="text" id="deliveryAddress" class="address-input" value="Dhirenpara, Guwahati, Kamrup Metro, Assam - 781025" placeholder="Full address">
    <label>📞 Phone (optional)</label>
    <input type="tel" id="customerPhone" class="address-input" placeholder="Your WhatsApp number" value="">
    <button class="checkout-btn" id="placeOrderBtn">📲 Place Order via WhatsApp</button>
  </div>
</div>

<script>
  // ---------- PRODUCT CATALOG (Blinkit style) ----------
  const products = [
    { id: 1, name: "Milk (Amul)", weight: "1L", price: 52, category: "essentials", icon: "🥛" },
    { id: 2, name: "Bread (Brown)", weight: "400g", price: 38, category: "essentials", icon: "🍞" },
    { id: 3, name: "Eggs (6 pcs)", weight: "6 pcs", price: 45, category: "essentials", icon: "🥚" },
    { id: 4, name: "Basmati Rice", weight: "5kg", price: 299, category: "essentials", icon: "🍚" },
    { id: 5, name: "Lays Chips", weight: "52g", price: 20, category: "snacks", icon: "🍟" },
    { id: 6, name: "Oreo Biscuits", weight: "72g", price: 30, category: "snacks", icon: "🍪" },
    { id: 7, name: "Coca Cola", weight: "750ml", price: 45, category: "beverages", icon: "🥤" },
    { id: 8, name: "Mineral Water", weight: "1L", price: 18, category: "beverages", icon: "💧" },
    { id: 9, name: "Paneer (Fresh)", weight: "200g", price: 75, category: "essentials", icon: "🧀" },
    { id: 10, name: "Onion (1kg)", weight: "1kg", price: 28, category: "essentials", icon: "🧅" },
    { id: 11, name: "Potato (1kg)", weight: "1kg", price: 24, category: "essentials", icon: "🥔" },
    { id: 12, name: "Maggi Noodles", weight: "280g pack", price: 56, category: "snacks", icon: "🍜" }
  ];

  let cart = [];
  let activeCategory = "all";

  // Helper: save/load cart
  function saveCart() {
    localStorage.setItem("quickbazar_cart", JSON.stringify(cart));
    updateCartUI();
  }
  function loadCart() {
    const stored = localStorage.getItem("quickbazar_cart");
    if (stored) cart = JSON.parse(stored);
    else cart = [];
    updateCartUI();
  }

  function updateCartUI() {
    const count = cart.reduce((sum, item) => sum + item.quantity, 0);
    document.getElementById("cartCount").innerText = count;
    renderCartDrawer();
  }

  function addToCart(product) {
    const existing = cart.find(item => item.id === product.id);
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({ ...product, quantity: 1 });
    }
    saveCart();
    showTemporaryFeedback(product.name);
  }

  function showTemporaryFeedback(name) {
    const btn = event?.target;
    if (btn && btn.innerText === "Add") {
      btn.innerText = "✓ Added";
      setTimeout(() => { btn.innerText = "Add"; }, 800);
    } else {
      alert(`➕ ${name} added to cart`);
    }
  }

  function removeCartItem(productId) {
    cart = cart.filter(item => item.id !== productId);
    saveCart();
  }

  function updateQuantity(productId, delta) {
    const item = cart.find(i => i.id === productId);
    if (item) {
      item.quantity += delta;
      if (item.quantity <= 0) {
        removeCartItem(productId);
      } else {
        saveCart();
      }
    }
  }

  function renderCartDrawer() {
    const container = document.getElementById("cartItemsList");
    if (!container) return;
    if (cart.length === 0) {
      container.innerHTML = `<div style="text-align:center; padding:20px; color:gray;">Cart is empty 🛒</div>`;
      document.getElementById("cartTotalDisplay").innerText = "Total: ₹0";
      return;
    }
    let html = "";
    let total = 0;
    cart.forEach(item => {
      const itemTotal = item.price * item.quantity;
      total += itemTotal;
      html += `
        <div class="cart-item">
          <div><strong>${item.name}</strong><br>${item.weight} x ${item.quantity}</div>
          <div>₹${itemTotal} 
            <button style="background:#f0f0f0; border:none; width:28px; border-radius:20px; margin-left:8px;" onclick="updateQuantity(${item.id}, -1)">-</button>
            <button style="background:#2e7d32; color:white; border:none; width:28px; border-radius:20px;" onclick="updateQuantity(${item.id}, 1)">+</button>
            <button style="background:#ccc; border:none; margin-left:6px; border-radius:20px; padding:2px 8px;" onclick="removeCartItem(${item.id})">🗑️</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
    document.getElementById("cartTotalDisplay").innerHTML = `Total: ₹${total}`;
  }

  function renderProducts() {
    const container = document.getElementById("productsContainer");
    let filtered = activeCategory === "all" ? products : products.filter(p => p.category === activeCategory);
    let html = "";
    filtered.forEach(p => {
      html += `
        <div class="product-card">
          <div class="product-img">${p.icon}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-weight">${p.weight}</div>
          <div class="price">₹${p.price}</div>
          <button class="add-btn" onclick="addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')})">Add</button>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  // Category switching
  document.getElementById("categoryTabs")?.addEventListener("click", (e) => {
    const catDiv = e.target.closest(".cat");
    if (!catDiv) return;
    document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
    catDiv.classList.add("active");
    activeCategory = catDiv.dataset.cat;
    renderProducts();
  });

  // Cart drawer open/close
  const overlay = document.getElementById("cartOverlay");
  const drawer = document.getElementById("cartDrawer");
  function openCart() {
    overlay.classList.add("active");
    drawer.classList.add("active");
    renderCartDrawer();
  }
  function closeCart() {
    overlay.classList.remove("active");
    drawer.classList.remove("active");
  }
  document.getElementById("cartIcon")?.addEventListener("click", openCart);
  document.getElementById("closeCartBtn")?.addEventListener("click", closeCart);
  overlay?.addEventListener("click", (e) => {
    if (e.target === overlay) closeCart();
  });

  // PLACE ORDER -> WhatsApp message to 7002336938
  document.getElementById("placeOrderBtn")?.addEventListener("click", () => {
    if (cart.length === 0) {
      alert("Your cart is empty! Add some items first.");
      return;
    }
    const address = document.getElementById("deliveryAddress").value.trim();
    if (!address) {
      alert("Please enter delivery address.");
      return;
    }
    let total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
    let orderItems = cart.map(i => `${i.name} (${i.weight}) x${i.quantity} = ₹${i.price * i.quantity}`).join("\n");
    let customerPhone = document.getElementById("customerPhone").value.trim();
    let msg = `🛵 NEW ORDER (QuickBazar)\n\n📍 Address: ${address}\n📞 Customer: ${customerPhone || "Not shared"}\n\n🛒 Items:\n${orderItems}\n\n💰 Total: ₹${total}\n\n⏱️ Delivery: Dhirenpara (10-15 min)\n🔗 Please confirm order.`;
    let encodedMsg = encodeURIComponent(msg);
    // Recipient number: 7002336938  (provided by you)
    let whatsappUrl = `https://wa.me/917002336938?text=${encodedMsg}`;
    window.open(whatsappUrl, '_blank');
    // optional: clear cart after order (user may want, but keep for now)
    // cart = []; saveCart(); renderProducts(); closeCart(); 
    // I'm not auto clearing because user might need to reorder; but we can ask. 
    // For better UX: ask if want to clear
    if (confirm("Order details sent to WhatsApp. Do you want to empty cart for next order?")) {
      cart = [];
      saveCart();
      renderProducts();
      closeCart();
    } else {
      closeCart();
    }
  });

  // initial render
  loadCart();
  renderProducts();
  // make functions global for inline onclick
  window.addToCart = addToCart;
  window.removeCartItem = removeCartItem;
  window.updateQuantity = updateQuantity;
</script>
</body>
</html>
