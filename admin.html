<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grocery Hub Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> Admin - Grocery Hub</h1>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>

        <div id="loginSection" class="login-box">
            <h2>Admin Login</h2>
            <input type="text" id="adminUser" placeholder="Username" value="admin">
            <input type="password" id="adminPass" placeholder="Password">
            <button id="loginBtn">Login</button>
            <p class="demo-creds">Use: admin / groceryhub</p>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="tabs">
                <button class="tab-btn active" data-tab="orders">📦 Orders</button>
                <button class="tab-btn" data-tab="products">🛒 Products</button>
            </div>
            <div id="ordersTab" class="tab-content active">
                <h2>Customer Orders</h2>
                <div id="ordersList"></div>
            </div>
            <div id="productsTab" class="tab-content">
                <h2>Manage Products</h2>
                <button id="showAddProductBtn">+ Add New Product</button>
                <div id="productFormDiv" style="display:none;">
                    <form id="productForm">
                        <input id="prodName" placeholder="Name" required>
                        <input id="prodCategory" placeholder="Category" required>
                        <input id="prodPrice" type="number" placeholder="Price" required>
                        <input id="prodUnit" placeholder="Unit (kg, pack)" required>
                        <input id="prodStock" type="number" placeholder="Stock" required>
                        <input id="prodImage" placeholder="Image URL">
                        <button type="submit">Add Product</button>
                    </form>
                </div>
                <div id="productsList"></div>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
